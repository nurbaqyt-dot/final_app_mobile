name: final_mobile_dev
description: "FlowDay - AI-powered daily planner for JIHC students."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.0
  provider: ^6.1.0
  go_router: ^14.0.0
  image_picker: ^1.1.0
  shared_preferences: ^2.3.0
  fl_chart: ^0.68.0
  intl: ^0.20.2
  uuid: ^4.4.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.8
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/jihc_logo.webp
